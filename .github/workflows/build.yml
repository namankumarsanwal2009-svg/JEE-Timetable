name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - name: Setup Gradle
        run: |
          mkdir -p JEETimetable/gradle/wrapper
          curl -L "https://github.com/gradle/gradle/raw/v8.4.0/gradle/wrapper/gradle-wrapper.jar" -o JEETimetable/gradle/wrapper/gradle-wrapper.jar
          printf 'distributionBase=GRADLE_USER_HOME\ndistributionPath=wrapper/dists\nzipStoreBase=GRADLE_USER_HOME\nzipStorePath=wrapper/dists\ndistributionUrl=https\\://services.gradle.org/distributions/gradle-8.4-bin.zip\n' > JEETimetable/gradle/wrapper/gradle-wrapper.properties
          printf '#!/bin/sh\nAPP_HOME=$(cd "$(dirname "$0")" && pwd -P)\nCLASSPATH="$APP_HOME/gradle/wrapper/gradle-wrapper.jar"\nexec java -classpath "$CLASSPATH" org.gradle.wrapper.GradleWrapperMain "$@"\n' > JEETimetable/gradlew
          chmod +x JEETimetable/gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
        working-directory: JEETimetable

      - uses: actions/upload-artifact@v4
        with:
          name: JEE-Timetable-APK
          path: JEETimetable/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
